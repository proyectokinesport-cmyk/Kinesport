<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KineSport PR — Iniciar Sesión</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --kine-orange: #F17336;
      --kine-teal:   #4FB5AC;
      --kine-yellow: #FFD44C;
      --kine-black:  #1A1A1A;
    }
    .bg-kine-gradient { background: linear-gradient(135deg, var(--kine-black) 0%, #2a2a2a 100%); }
    .btn-primary { background-color: var(--kine-orange); transition: transform 0.2s, opacity 0.2s; }
    .btn-primary:hover  { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.97); }
    input:focus { border-color: var(--kine-teal) !important; box-shadow: 0 0 0 3px rgba(79,181,172,0.2); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl p-6 flex items-center gap-3">
      <i class="fa-solid fa-spinner fa-spin text-[--kine-orange] text-2xl"></i>
      <span class="font-medium text-gray-700">Iniciando sesión...</span>
    </div>
  </div>

  <!-- ALERT BANNER -->
  <div id="alert-banner" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-lg text-white text-sm font-medium max-w-xs w-full text-center">
    <span id="alert-message"></span>
  </div>

  <!-- HEADER -->
  <header class="bg-kine-gradient text-white p-8 text-center shadow-lg">
    <div class="flex justify-center mb-3">
      <img src="/icons/icon.svg" alt="KineSport PR" class="w-20 h-20 rounded-full shadow-lg border-2 border-white/20">
    </div>
    <h1 class="text-2xl font-bold tracking-tight">KINESPORT</h1>
    <p class="text-gray-400 text-sm mt-1">Recovery & Physical Therapy</p>
  </header>

  <!-- FORM -->
  <main class="flex-1 flex items-start justify-center p-4 pt-6">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl shadow-md p-6 border-t-4" style="border-color: var(--kine-orange)">
        <h2 class="text-xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>

        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-regular fa-envelope mr-1 text-[--kine-teal]"></i>Correo electrónico
            </label>
            <input id="login-email" type="email" required autocomplete="email"
              placeholder="tu@email.com"
              class="w-full p-3 border border-gray-300 rounded-lg outline-none transition-all text-sm">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              <i class="fa-solid fa-lock mr-1 text-[--kine-teal]"></i>Contraseña
            </label>
            <div class="relative">
              <input id="login-password" type="password" required autocomplete="current-password"
                placeholder="••••••••"
                class="w-full p-3 border border-gray-300 rounded-lg outline-none transition-all text-sm pr-10">
              <button type="button" id="toggle-pw"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" id="login-btn"
            class="btn-primary w-full text-white font-bold py-3 rounded-xl shadow uppercase tracking-wider text-sm">
            Entrar
          </button>
        </form>

        <div class="text-center mt-5 space-y-2">
          <p class="text-sm text-gray-500">
            ¿No tienes cuenta?
            <a href="/register.html" class="font-semibold" style="color: var(--kine-teal)">Crear cuenta</a>
          </p>
          <a href="#" id="forgot-pw" class="text-xs text-gray-400 hover:text-gray-600 block">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    // Redirigir si ya está logueado
    AuthService.redirectIfLoggedIn();

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('login-password');
      const icon = document.querySelector('#toggle-pw i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Submit login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('login-btn');
      const loading  = document.getElementById('loading-overlay');

      btn.disabled = true;
      loading.classList.remove('hidden');

      try {
        const user     = await AuthService.login(email, password);
        const userData = await AuthService.getCurrentUserData();
        window.location.href = userData?.role === 'admin' ? '/admin.html' : '/index.html';
      } catch (err) {
        loading.classList.add('hidden');
        btn.disabled = false;
        const msgs = {
          'auth/user-not-found':    'No existe una cuenta con ese correo.',
          'auth/wrong-password':    'Contraseña incorrecta.',
          'auth/invalid-email':     'Correo inválido.',
          'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
          'auth/invalid-credential':'Correo o contraseña incorrectos.'
        };
        showAlert(msgs[err.code] || 'Error al iniciar sesión. Intenta de nuevo.', 'error');
      }
    });

    // Recuperar contraseña
    document.getElementById('forgot-pw').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      if (!email) {
        showAlert('Escribe tu correo arriba primero.', 'error');
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        showAlert('Correo de recuperación enviado. Revisa tu bandeja.', 'success');
      } catch (err) {
        showAlert('Error enviando correo. Verifica el email.', 'error');
      }
    });

    function showAlert(msg, type) {
      const el    = document.getElementById('alert-banner');
      const msgEl = document.getElementById('alert-message');
      msgEl.textContent = msg;
      el.className = `fixed top-4 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-lg text-white text-sm font-medium max-w-xs w-full text-center ${
        type === 'success' ? 'bg-green-500' : 'bg-red-500'
      }`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }
  </script>
</body>
</html>
